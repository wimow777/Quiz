<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Diccionario de Competencias MAP</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a1628;
    --navy-mid: #112240;
    --navy-light: #1d3461;
    --blue: #1a6fd4;
    --blue-bright: #3a8ef6;
    --teal: #00c9a7;
    --gold: #f5a623;
    --red: #ff4d6d;
    --green: #2ec4b6;
    --white: #f0f4ff;
    --muted: #8899bb;
    --card: #152035;
    --border: #1e3254;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 60% 40% at 80% 10%, rgba(26,111,212,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 10% 80%, rgba(0,201,167,0.10) 0%, transparent 60%);
  }

  .header {
    background: linear-gradient(135deg, var(--navy-mid) 0%, var(--navy-light) 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header-badge {
    background: var(--blue);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 10px;
    border-radius: 4px;
  }
  .header-title { font-size: 17px; font-weight: 700; }
  .header-sub { font-size: 12px; color: var(--muted); font-weight: 400; }

  /* Cronómetro: se oculta por defecto (solo visible en quiz y resultados) */
  .timer-box {
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px;
    font-weight: 600;
    color: var(--teal);
    background: rgba(0,201,167,0.08);
    border: 1px solid rgba(0,201,167,0.25);
    padding: 8px 20px;
    border-radius: 8px;
    min-width: 140px;
    text-align: center;
    transition: color 0.3s, border-color 0.3s, background 0.3s;
  }
  .timer-box.warning { color: var(--gold); border-color: rgba(245,166,35,0.4); background: rgba(245,166,35,0.08); }
  .timer-box.danger  { color: var(--red);  border-color: rgba(255,77,109,0.4);  background: rgba(255,77,109,0.08); animation: pulse 0.8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

  /* Clase para ocultar el cronómetro (modo menú) */
  .timer-hidden { display: none; }

  .progress-wrap {
    padding: 18px 32px 0;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .progress-bar-bg {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--teal));
    border-radius: 10px;
    transition: width 0.5s ease;
  }
  .progress-label { font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; min-width: 52px; }

  .wrapper {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  /* ========== MENÚ PRINCIPAL (diseño mejorado) ========== */
  .menu {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 48px;
    animation: fadeIn 0.5s ease;
  }
  .menu-header {
    text-align: center;
    max-width: 700px;
  }
  .menu-icon {
    width: 100px;
    height: 100px;
    background: linear-gradient(135deg, var(--blue), var(--teal));
    border-radius: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    margin: 0 auto 24px;
    box-shadow: 0 0 40px rgba(26,111,212,0.4);
  }
  .menu h1 {
    font-size: 36px;
    font-weight: 800;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #fff, var(--teal));
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
  }
  .menu h1 span { color: var(--teal); background: none; background-clip: unset; -webkit-background-clip: unset; }
  .menu .subtitle {
    font-size: 16px;
    color: var(--muted);
    line-height: 1.6;
    margin-top: 8px;
  }
  .menu-instruction {
    font-size: 14px;
    color: var(--blue-bright);
    margin-top: 16px;
    font-weight: 500;
  }

  .topics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 28px;
    width: 100%;
  }
  .topic-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 24px 20px;
    transition: all 0.3s ease;
    text-align: center;
    backdrop-filter: blur(4px);
  }
  .topic-card:hover {
    transform: translateY(-6px);
    border-color: var(--blue);
    box-shadow: 0 12px 30px rgba(0,0,0,0.3);
  }
  .topic-name {
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 20px;
    color: var(--white);
    letter-spacing: -0.3px;
  }
  .difficulty-buttons {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin: 20px 0 12px;
    flex-wrap: wrap;
  }
  .btn-difficulty {
    font-family: 'Sora', sans-serif;
    font-weight: 600;
    font-size: 13px;
    padding: 8px 18px;
    border-radius: 40px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    background: rgba(255,255,255,0.06);
    color: var(--white);
    border: 1px solid var(--border);
  }
  .btn-difficulty.easy { background: rgba(0,201,167,0.15); border-color: var(--teal); color: var(--teal); }
  .btn-difficulty.normal { background: rgba(26,111,212,0.15); border-color: var(--blue); color: var(--blue-bright); }
  .btn-difficulty.hard { background: rgba(255,77,109,0.15); border-color: var(--red); color: #ff8fa3; }
  .btn-difficulty:hover { transform: scale(1.02); filter: brightness(1.1); cursor: pointer; }
  .topic-stats {
    font-size: 12px;
    color: var(--muted);
    margin-top: 16px;
    border-top: 1px dashed var(--border);
    padding-top: 12px;
  }

  .simulation-card {
    background: linear-gradient(135deg, rgba(26,111,212,0.12), rgba(0,201,167,0.08));
    border: 2px solid var(--blue);
    grid-column: span 2;
  }
  .simulation-card .topic-name { color: var(--teal); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Estilos del quiz (sin cambios) */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    animation: slideIn 0.35s ease;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  .q-meta {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 22px;
  }
  .q-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--muted);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 6px;
  }
  .q-category {
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--blue-bright);
  }
  .q-text {
    font-size: 18px; font-weight: 600; line-height: 1.5;
    margin-bottom: 28px;
    color: var(--white);
  }

  .options { display: flex; flex-direction: column; gap: 12px; }
  .option {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 20px;
    background: rgba(255,255,255,0.03);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    color: var(--white);
    line-height: 1.5;
    position: relative;
    overflow: hidden;
  }
  .option::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--blue);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .option:hover:not(:disabled) { border-color: var(--blue); background: rgba(26,111,212,0.08); }
  .option:hover:not(:disabled)::before { opacity: 1; }
  .option:disabled { cursor: not-allowed; }

  .option-letter {
    width: 32px; height: 32px; min-width: 32px;
    border-radius: 8px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600; font-size: 13px;
    transition: all 0.2s;
  }
  .option.selected { border-color: var(--blue-bright); background: rgba(58,142,246,0.12); }
  .option.selected .option-letter { background: var(--blue); border-color: var(--blue); color: #fff; }
  .option.correct { border-color: var(--green) !important; background: rgba(46,196,182,0.12) !important; }
  .option.correct .option-letter { background: var(--green) !important; border-color: var(--green) !important; color: var(--navy) !important; }
  .option.wrong { border-color: var(--red) !important; background: rgba(255,77,109,0.10) !important; }
  .option.wrong .option-letter { background: var(--red) !important; border-color: var(--red) !important; color: #fff !important; }

  .feedback-box {
    margin-top: 20px;
    padding: 16px 20px;
    border-radius: 10px;
    font-size: 14px; line-height: 1.6;
    display: none;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .feedback-box.correct {
    display: block;
    background: rgba(46,196,182,0.10);
    border: 1px solid rgba(46,196,182,0.3);
    color: var(--green);
  }
  .feedback-box.wrong {
    display: block;
    background: rgba(255,77,109,0.08);
    border: 1px solid rgba(255,77,109,0.25);
    color: #ff8fa3;
  }
  .feedback-box strong { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; }

  .q-nav {
    display: flex;
    justify-content: space-between;
    margin-top: 28px;
    gap: 12px;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 13px 30px;
    border-radius: 10px;
    border: none;
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--blue), var(--blue-bright));
    color: #fff;
    box-shadow: 0 4px 20px rgba(26,111,212,0.4);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(26,111,212,0.5); }
  .btn-secondary {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--white);
  }
  .btn-secondary:hover { border-color: var(--blue); color: var(--blue-bright); }
  .btn-teal {
    background: linear-gradient(135deg, var(--teal), #00a68a);
    color: var(--navy);
    box-shadow: 0 4px 20px rgba(0,201,167,0.3);
  }
  .btn-teal:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,201,167,0.4); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

  .results { display: none; animation: slideIn 0.4s ease; }
  .score-hero {
    text-align: center;
    padding: 48px 24px 32px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 28px;
  }
  .score-ring {
    width: 140px; height: 140px;
    border-radius: 50%;
    margin: 0 auto 24px;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    position: relative;
  }
  .score-ring svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
  .score-pct { font-size: 38px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
  .score-label { font-size: 12px; color: var(--muted); }
  .score-grade { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
  .score-stats {
    display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-top: 20px;
  }
  .stat-chip {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    text-align: center;
  }
  .stat-chip .val { font-size: 22px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
  .stat-chip .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .stat-chip.correct-stat .val { color: var(--green); }
  .stat-chip.wrong-stat .val  { color: var(--red); }
  .stat-chip.time-stat .val   { color: var(--teal); }

  .review-title {
    font-size: 16px; font-weight: 700;
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .review-title::after {
    content: '';
    flex: 1; height: 1px;
    background: var(--border);
  }
  .review-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 24px;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }
  .review-item.review-correct { border-left: 3px solid var(--green); }
  .review-item.review-wrong   { border-left: 3px solid var(--red); }
  .review-q-header {
    display: flex; align-items: flex-start; gap: 12px;
    margin-bottom: 14px;
  }
  .review-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 600;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    padding: 3px 8px; border-radius: 5px;
    min-width: 36px; text-align: center;
    margin-top: 2px;
  }
  .review-q-text { font-size: 14px; font-weight: 600; line-height: 1.5; flex: 1; }
  .review-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .review-opt {
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 13px; line-height: 1.5;
    padding: 8px 12px;
    border-radius: 7px;
    background: rgba(255,255,255,0.02);
  }
  .review-opt.opt-correct { background: rgba(46,196,182,0.10); color: var(--green); }
  .review-opt.opt-wrong   { background: rgba(255,77,109,0.08); color: #ff8fa3; }
  .review-opt-badge {
    font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px;
    white-space: nowrap; margin-top: 2px;
  }
  .badge-correct { background: var(--green); color: var(--navy); }
  .badge-wrong   { background: var(--red);   color: #fff; }
  .explanation {
    margin-top: 10px;
    padding: 12px 14px;
    background: rgba(0,201,167,0.06);
    border: 1px solid rgba(0,201,167,0.20);
    border-radius: 8px;
    font-size: 13px; color: #a0d4cf; line-height: 1.6;
  }
  .explanation strong { color: var(--teal); }

  .hidden { display: none !important; }
  .page-results-buttons {
    display: flex; gap: 12px; justify-content: center;
    margin: 28px 0;
    flex-wrap: wrap;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-badge">MAP RD</div>
    <div>
      <div class="header-title">Quiz de Competencias</div>
      <div class="header-sub">Diccionario General — Administración Pública</div>
    </div>
  </div>
  <div class="timer-box" id="timer">00:00</div>
</div>

<div class="progress-wrap" id="progressWrap" style="display:none">
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="progress-label" id="progressLabel">0 / 0</div>
</div>

<div class="wrapper">
  <div id="menu" class="menu"></div>
  <div id="quizArea" class="hidden">
    <div class="question-card" id="questionCard"></div>
    <div class="q-nav" id="qNav">
      <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()" disabled>← Anterior</button>
      <button class="btn btn-secondary" onclick="goToMenu()">🏠 Menú Principal</button>
      <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>Siguiente →</button>
    </div>
  </div>
  <div id="results" class="results hidden">
    <div class="score-hero">
      <div class="score-ring">
        <svg width="140" height="140" viewBox="0 0 140 140">
          <circle cx="70" cy="70" r="60" stroke="rgba(255,255,255,0.06)" stroke-width="10" fill="none"/>
          <circle id="scoreCircle" cx="70" cy="70" r="60" stroke="var(--teal)" stroke-width="10" fill="none"
            stroke-dasharray="377" stroke-dashoffset="377" stroke-linecap="round"
            style="transition: stroke-dashoffset 1.2s ease"/>
        </svg>
        <div class="score-pct" id="scorePct">0%</div>
        <div class="score-label">Aciertos</div>
      </div>
      <div class="score-grade" id="scoreGrade"></div>
      <div id="scoreMsg" style="font-size:14px;color:var(--muted);margin-bottom:20px"></div>
      <div class="score-stats">
        <div class="stat-chip correct-stat"><div class="val" id="correctCount">0</div><div class="lbl">Correctas</div></div>
        <div class="stat-chip wrong-stat"><div class="val" id="wrongCount">0</div><div class="lbl">Incorrectas</div></div>
        <div class="stat-chip time-stat"><div class="val" id="timeUsed">0:00</div><div class="lbl">Tiempo usado</div></div>
      </div>
    </div>
    <div class="page-results-buttons">
      <button class="btn btn-secondary" onclick="goToMenu()">🏠 Menú Principal</button>
      <button class="btn btn-teal" onclick="scrollToReview()">📋 Ver revisión completa</button>
    </div>
    <div id="reviewSection"><div class="review-title">Revisión de Preguntas</div><div id="reviewList"></div></div>
  </div>
</div>

<script>
// ============================================================
// BANCO DE PREGUNTAS (60 preguntas únicas con explicaciones detalladas)
// ============================================================
const QUESTIONS_BANK = [
  { category: "Estructura General", text: "¿Cuántas competencias conforman el Diccionario General de Competencias y Comportamientos?", options: ["12", "14", "16", "18"], correct: 2, explanation: "Artículo 8 de la Resolución MAP-48-2018: 16 competencias en 4 tipos." },
  { category: "Estructura General", text: "¿En cuántos tipos se agrupan las competencias?", options: ["2", "3", "4", "5"], correct: 2, explanation: "Cuatro tipos: Cardinales, Régimen Ético, Directivas y Funcionales." },
  { category: "Marco Legal", text: "¿Qué ley declara al MAP órgano rector del empleo público?", options: ["Ley 1-12", "Ley 41-08", "Ley 247-12", "Ley 66-97"], correct: 1, explanation: "Ley 41-08 de Función Pública, artículo 1." },
  { category: "Marco Legal", text: "¿Mediante qué instrumento se aprobó el Diccionario General?", options: ["Ley 41-08", "Reglamento 525-09", "Resolución MAP-48-2018", "Ley 1-12"], correct: 2, explanation: "Resolución Núm. 48-2018 del 4 de mayo de 2018." },
  { category: "Marco Legal", text: "¿Qué reglamento incluye las competencias en la evaluación del desempeño?", options: ["Reglamento 525-09", "Reglamento 251-15", "Ley 41-08", "Resolución 48-2018"], correct: 0, explanation: "Reglamento 525-09 de Evaluación del Desempeño." },
  { category: "Marco Legal", text: "¿Qué reglamento exige evaluar competencias en los concursos de oposición?", options: ["Reglamento 525-09", "Reglamento 251-15", "Ley 1-12", "Resolución 48-2018"], correct: 1, explanation: "Reglamento 251-15 de Reclutamiento y Selección." },
  { category: "Marco Legal", text: "Documento iberoamericano base para la modernización (2003):", options: ["Carta Iberoamericana de la Función Pública", "Guía Referencial de Competencias", "Declaración de Santo Domingo", "Modelo CAF"], correct: 0, explanation: "Carta Iberoamericana del CLAD, adoptada en 2003." },
  { category: "Marco Legal", text: "Documento de la XVII Conferencia Iberoamericana (2016):", options: ["Carta Iberoamericana", "Guía Referencial de Competencias Laborales", "Declaración de Bogotá", "Modelo de Competencias"], correct: 1, explanation: "Guía Referencial Iberoamericana de Competencias Laborales en el Sector Público." },
  { category: "Grados de Dominio", text: "¿Cuántos grados de dominio (sin contar el 0)?", options: ["2", "3", "4", "5"], correct: 2, explanation: "Artículo 9: Grados 4,3,2,1." },
  { category: "Grados de Dominio", text: "¿Qué significa Grado 0?", options: ["Nivel básico", "En desarrollo", "Competencia no demostrada", "Excelencia"], correct: 2, explanation: "Competencia no demostrada, no exhibe comportamientos esperados." },
  { category: "Grados de Dominio", text: "¿Cuántos comportamientos por grado?", options: ["3", "4", "5", "6"], correct: 2, explanation: "Cinco comportamientos por cada grado." },
  { category: "Grados de Dominio", text: "Define mecanismos de cooperación interáreas → Colaboración grado:", options: ["Grado 1", "Grado 2", "Grado 3", "Grado 4"], correct: 3, explanation: "Comportamiento del Grado 4 de Colaboración." },
  { category: "Grados de Dominio", text: "Verifica uso de canales de comunicación → Conciencia Social grado:", options: ["Grado 1", "Grado 2", "Grado 3", "Grado 4"], correct: 1, explanation: "Comportamientos del Grado 2 de Conciencia Social." },

function shuffleArray(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }
function getQuestionsByGroup(group) { return QUESTIONS_BANK.filter(q => group.categories.includes(q.category)); }
function selectRandomQuestions(baseArray, count) {
  const shuffledBase = shuffleArray([...baseArray]);
  const selected = shuffledBase.slice(0, Math.min(count, baseArray.length));
  return selected.map(q => {
    const originalCorrectText = q.options[q.correct];
    const shuffledOptions = shuffleArray([...q.options]);
    const newCorrectIndex = shuffledOptions.indexOf(originalCorrectText);
    return { ...q, options: shuffledOptions, correct: newCorrectIndex };
  });
}

function updateTimerDisplay() {
  const minutes = Math.floor(secondsRemaining / 60).toString().padStart(2, '0');
  const secs = (secondsRemaining % 60).toString().padStart(2, '0');
  const timerEl = document.getElementById('timer');
  timerEl.textContent = `${minutes}:${secs}`;
  if (secondsRemaining <= 60) timerEl.className = 'timer-box danger';
  else if (secondsRemaining <= 300) timerEl.className = 'timer-box warning';
  else timerEl.className = 'timer-box';
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!quizActive) return;
    if (secondsRemaining <= 0) { clearInterval(timerInterval); timerInterval = null; if (quizActive) showResults(true); }
    else { secondsRemaining--; updateTimerDisplay(); }
  }, 1000);
}
function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }

function startQuizWithGroup(group, difficultyKey) {
  const setting = difficultySettings[difficultyKey];
  if (!setting) return;
  stopTimer(); quizActive = false;
  const baseQuestions = getQuestionsByGroup(group);
  if (!baseQuestions.length) return;
  const selectedRaw = selectRandomQuestions(baseQuestions, setting.questionCount);
  currentQuestions = selectedRaw;
  userAnswers = Array(currentQuestions.length).fill(null);
  answered = Array(currentQuestions.length).fill(false);
  current = 0;
  secondsRemaining = setting.timeLimitSec;
  timeLimitTotal = setting.timeLimitSec;
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  document.getElementById('progressWrap').style.display = 'flex';
  document.getElementById('progressLabel').textContent = `0 / ${currentQuestions.length}`;
  document.getElementById('timer').classList.remove('timer-hidden');
  updateTimerDisplay();
  quizActive = true;
  startTimer();
  renderQuestion();
}

function buildMenu() {

      <button class="btn-difficulty easy" data-group-index="${idx}" data-diff="easy">🌿 Fácil</button>
      <button class="btn-difficulty normal" data-group-index="${idx}" data-diff="normal">⚖️ Normal</button>
      <button class="btn-difficulty hard" data-group-index="${idx}" data-diff="hard">🔥 Difícil</button>
    </div><div class="topic-stats">${qCount} preguntas disponibles</div></div>`;
  }).join('');

  document.querySelectorAll('.btn-difficulty[data-group-index]').forEach(btn => {
    btn.addEventListener('click', (e) => { e.stopPropagation(); const idx = parseInt(btn.dataset.groupIndex); const diff = btn.dataset.diff; startQuizWithGroup(TOPIC_GROUPS[idx], diff); });

}
